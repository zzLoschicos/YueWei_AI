<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>登录 · 阅微 AI 诊断系统</title>
  <link rel="stylesheet" href="../css/styles.css">
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;600;700&family=Noto+Sans+SC:wght@300;400;500;600;700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    body {
      background: linear-gradient(135deg, #1e1e2e 0%, #2d1b4e 50%, #1a1040 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: var(--font-sans);
    }
    .login-card {
      background: #fff;
      border-radius: var(--radius-2xl);
      box-shadow: var(--shadow-2xl);
      padding: var(--space-10) var(--space-8);
      width: 100%;
      max-width: 420px;
      animation: slide-up 0.4s ease-out;
    }
    @keyframes slide-up {
      from { opacity: 0; transform: translateY(20px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    .login-logo {
      width: 56px;
      height: 56px;
      background: linear-gradient(135deg, var(--color-primary), var(--color-secondary));
      border-radius: var(--radius-lg);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 28px;
      margin: 0 auto var(--space-4);
      box-shadow: 0 8px 24px rgba(79,70,229,0.35);
    }
    .login-title {
      font-family: var(--font-serif);
      font-size: var(--text-2xl);
      font-weight: 700;
      color: var(--color-slate-800);
      text-align: center;
      margin-bottom: var(--space-1);
    }
    .login-sub {
      font-size: var(--text-sm);
      color: var(--color-slate-400);
      text-align: center;
      margin-bottom: var(--space-8);
    }
    .form-input.error { border-color: var(--color-danger); }
    .error-msg {
      font-size: var(--text-xs);
      color: var(--color-danger);
      margin-top: var(--space-1);
    }
    @media (max-width: 768px) {
      .login-card { padding: var(--space-8) var(--space-5); }
    }
    @media (max-width: 480px) {
      .login-card { padding: var(--space-6) var(--space-4); border-radius: var(--radius-lg); }
      .login-logo { width: 48px; height: 48px; font-size: 24px; }
    }
  </style>
</head>
<body>

<div class="login-card">
  <!-- Logo -->
  <div class="login-logo">🏮</div>
  <h1 class="login-title">阅微 AI</h1>
  <p class="login-sub">教师管理后台 · 请先登录</p>

  <form id="login-form" onsubmit="handleLogin(event)">
    <div class="form-group">
      <label class="form-label">用户名</label>
      <input
        type="text"
        class="form-input"
        id="username"
        placeholder="请输入用户名"
        required
        autocomplete="username"
      >
    </div>

    <div class="form-group">
      <label class="form-label">密码</label>
      <input
        type="password"
        class="form-input"
        id="password"
        placeholder="请输入密码"
        required
        autocomplete="current-password"
      >
      <div class="error-msg" id="error-msg" style="display:none"></div>
    </div>

    <button type="submit" class="btn btn-primary btn-lg" id="login-btn" style="width:100%;margin-top:var(--space-2)">
      🔑 登录管理后台
    </button>
  </form>

  <div style="margin-top:var(--space-6);text-align:center">
    <div style="font-size:var(--text-xs);color:var(--color-slate-300)">
      默认账号：admin &nbsp;|&nbsp; 密码：admin123
    </div>
  </div>
</div>

<script src="../js/app.js"></script>
<script>
const API_BASE = 'http://yuwenstudy.top:3804';

async function handleLogin(e) {
  e.preventDefault();
  const username = document.getElementById('username').value.trim();
  const password = document.getElementById('password').value;
  const btn = document.getElementById('login-btn');
  const errorMsg = document.getElementById('error-msg');

  errorMsg.style.display = 'none';
  errorMsg.textContent = '';
  btn.disabled = true;
  btn.innerHTML = '<span class="spinner"></span> 登录中…';

  try {
    const res = await fetch(`${API_BASE}/api/auth/login`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ username, password }),
    });
    const json = await res.json();

    if (json.code === 0) {
      // 保存 token
      localStorage.setItem('yw_token', json.data.token);
      localStorage.setItem('yw_admin', json.data.user.name);
      Toast.success('登录成功', `欢迎回来，${json.data.user.name}`);
      setTimeout(() => window.location.href = 'dashboard.html', 800);
    } else {
      errorMsg.textContent = json.message || '用户名或密码错误';
      errorMsg.style.display = 'block';
      document.getElementById('password').classList.add('error');
      btn.disabled = false;
      btn.innerHTML = '🔑 登录管理后台';
    }
  } catch(err) {
    errorMsg.textContent = '网络错误，请检查服务器连接（是否已启动后端服务？）';
    errorMsg.style.display = 'block';
    btn.disabled = false;
    btn.innerHTML = '🔑 登录管理后台';
  }
}

// 清除输入框错误样式
document.getElementById('password').addEventListener('input', function() {
  this.classList.remove('error');
  document.getElementById('error-msg').style.display = 'none';
});
</script>
</body>
</html>
