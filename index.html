<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>阅微 AI 诊断系统 · Enterprise Edition</title>
  <link rel="stylesheet" href="css/styles.css">
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;600;700&family=Noto+Sans+SC:wght@300;400;500;600;700&display=swap" rel="stylesheet">
</head>
<body style="background:linear-gradient(135deg,#1e1e2e 0%,#2d1b4e 50%,#1a1040 100%);min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;font-family:var(--font-sans)">

  <!-- Hero -->
  <div style="text-align:center;max-width:640px;padding:var(--space-8)">

    <!-- Logo -->
    <div style="width:80px;height:80px;background:linear-gradient(135deg,#4F46E5,#7C3AED);border-radius:20px;display:flex;align-items:center;justify-content:center;margin:0 auto var(--space-6);font-size:36px;box-shadow:0 20px 60px rgba(79,70,229,0.4)">
      🏮
    </div>

    <h1 style="font-family:var(--font-serif);font-size:clamp(2rem,5vw,3rem);font-weight:700;color:#fff;margin-bottom:var(--space-3);line-height:1.2">
      阅微 AI 诊断系统
    </h1>
    <p style="font-size:var(--text-lg);color:rgba(255,255,255,0.55);margin-bottom:var(--space-2)">
      Enterprise Edition
    </p>
    <p style="color:rgba(255,255,255,0.4);font-size:var(--text-sm);margin-bottom:var(--space-10);line-height:1.8">
      基于 DeepSeek 大模型的高中语文智能批改平台<br>
      覆盖诗歌鉴赏与现代文阅读两大核心模块
    </p>

    <!-- Entrance Cards -->
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:var(--space-4)">

      <!-- Teacher Portal -->
      <a href="teacher/dashboard.html" class="card" style="padding:var(--space-6);text-align:left;text-decoration:none;transition:all 0.3s;background:rgba(255,255,255,0.06);border:1px solid rgba(255,255,255,0.1);border-radius:var(--radius-xl)">
        <div style="font-size:32px;margin-bottom:var(--space-4)">👨‍🏫</div>
        <h3 style="font-size:var(--text-lg);font-weight:700;color:#fff;margin-bottom:var(--space-2)">教师端</h3>
        <p style="font-size:var(--text-xs);color:rgba(255,255,255,0.45);line-height:1.7;margin-bottom:var(--space-4)">
          数据看板 · 邀请码管理<br>题目发布 · 报告查看
        </p>
        <div style="display:inline-flex;align-items:center;gap:6px;font-size:var(--text-xs);color:#4F46E5;font-weight:600;background:rgba(79,70,229,0.15);padding:6px 14px;border-radius:var(--radius-full)">
          进入管理后台 →
        </div>
      </a>

      <!-- Student Portal -->
      <a href="student/submit.html" class="card" style="padding:var(--space-6);text-align:left;text-decoration:none;transition:all 0.3s;background:rgba(255,255,255,0.06);border:1px solid rgba(255,255,255,0.1);border-radius:var(--radius-xl)">
        <div style="font-size:32px;margin-bottom:var(--space-4)">👨‍🎓</div>
        <h3 style="font-size:var(--text-lg);font-weight:700;color:#fff;margin-bottom:var(--space-2)">学生端</h3>
        <p style="font-size:var(--text-xs);color:rgba(255,255,255,0.45);line-height:1.7;margin-bottom:var(--space-4)">
          智能诊断舱 · 历史档案<br>报告查阅 · 进步追踪
        </p>
        <div style="display:inline-flex;align-items:center;gap:6px;font-size:var(--text-xs);color:#7C3AED;font-weight:600;background:rgba(124,58,237,0.15);padding:6px 14px;border-radius:var(--radius-full)">
          开始提交作答 →
        </div>
      </a>
    </div>

    <!-- Footer -->
    <div style="margin-top:var(--space-10);text-align:center">
      <div style="display:inline-flex;align-items:center;gap:var(--space-2);font-size:var(--text-xs);color:rgba(255,255,255,0.3)">
        <span>Powered by</span>
        <span style="color:rgba(255,255,255,0.5)">DeepSeek V3 · R1</span>
        <span>·</span>
        <span>Node.js</span>
        <span>·</span>
        <span>阅微 AI</span>
      </div>
    </div>
  </div>

  <!-- Cards hover effect -->
  <style>
    .card:hover { transform: translateY(-4px); box-shadow: 0 20px 40px rgba(0,0,0,0.3); border-color: rgba(255,255,255,0.2); }
  </style>

</body>
</html>
