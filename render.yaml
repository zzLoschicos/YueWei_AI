# 阅微 AI 诊断系统 · Render 部署配置
# Render.com — 蓝绿色署 Node.js 服务
# 部署地址：https://dashboard.render.com

services:
  # 后端 API 服务
  - type: web
    name: yuewei-backend
    env: node
    region: oregon  # 或 singapore（东南亚节点，延迟更低）
    plan: free  # 免费版：休眠后冷启动约30秒
    buildCommand: cd server && npm install
    startCommand: cd server && node src/index.js
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 3002
      - key: JWT_SECRET
        generateValue: true  # 自动生成随机密钥
      - key: DEEPSEEK_API_KEY
        sync: false  # 需要手动在 Render Dashboard 设置
      - key: DEEPSEEK_API_URL
        value: https://api.deepseek.com/v1/chat/completions
      - key: DB_PATH
        value: /var/data/yuewei.db
    disk:
      name: yuewei-data
      mountPath: /var/data
      sizeGB: 1  # SQLite 数据库持久化存储

